<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:#000; color:#fff; font-family: -apple-system, sans-serif; padding: 30px; text-align: center; }
button { width:100%; padding:20px; margin:10px 0; border-radius:12px; border:none; font-size:16px; font-weight:bold; cursor:pointer; }
#log { text-align:left; background:#111; padding:15px; border-radius:8px; font-size:13px; margin-top:20px; min-height:100px; white-space:pre-wrap; }
</style>
</head>
<body>
<h2>🔊 Test Audio iOS</h2>

<button onclick="testBeep()" style="background:#1d4ed8;color:white">Test 1: Beep (AudioContext)</button>
<button onclick="testMp3()" style="background:#15803d;color:white">Test 2: MP3 từ URL</button>
<button onclick="testBlob()" style="background:#92400e;color:white">Test 3: Blob URL (giống Gemini)</button>

<div id="log">Bấm từng nút để test...\n</div>

<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
}

// Test 1: AudioContext beep
function testBeep() {
    log('--- Test 1: AudioContext ---');
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume().then(() => {
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.value = 440;
            osc.start();
            setTimeout(() => { osc.stop(); log('✅ AudioContext: OK - nghe thấy tiếng beep?'); }, 500);
        });
    } catch(e) { log('❌ AudioContext lỗi: ' + e.message); }
}

// Test 2: MP3 từ CDN
function testMp3() {
    log('--- Test 2: MP3 từ URL ---');
    const a = document.getElementById('player');
    a.src = 'https://www.soundjay.com/button/beep-07.mp3';
    a.play().then(() => log('✅ MP3 URL: đang phát')).catch(e => log('❌ MP3 URL lỗi: ' + e.message));
}

// Test 3: Tạo WAV blob thủ công rồi phát (giống cách Gemini TTS làm)
function testBlob() {
    log('--- Test 3: Blob URL ---');
    // Tạo WAV 440Hz 0.5 giây thủ công
    const sampleRate = 44100;
    const duration = 0.5;
    const numSamples = sampleRate * duration;
    const buffer = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(buffer);
    // WAV header
    function writeStr(v, o, s) { for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); }
    writeStr(view,0,'RIFF'); view.setUint32(4,36+numSamples*2,true);
    writeStr(view,8,'WAVE'); writeStr(view,12,'fmt '); view.setUint32(16,16,true);
    view.setUint16(20,1,true); view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
    view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
    writeStr(view,36,'data'); view.setUint32(40,numSamples*2,true);
    for(let i=0;i<numSamples;i++) {
        view.setInt16(44+i*2, Math.sin(2*Math.PI*440*i/sampleRate)*0x7FFF, true);
    }
    const blob = new Blob([buffer], {type:'audio/wav'});
    const url = URL.createObjectURL(blob);
    log('Blob URL tạo xong: ' + url.substring(0,40) + '...');
    const a = document.getElementById('player');
    a.src = url;
    a.load();
    a.play().then(() => log('✅ Blob WAV: đang phát - nghe thấy tiếng không?'))
            .catch(e => log('❌ Blob WAV lỗi: ' + e.message));
}
</script>

<audio id="player"></audio>
</body>
</html>
