<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình đọc sách</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; padding: 16px; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
        h2 { font-size: 18px; font-weight: 700; text-align: center; color: #e5e7eb; }
        .key-row input { width: 100%; padding: 10px 12px; border-radius: 10px; background: #1f1f1f; border: 1px solid #374151; color: #fff; font-size: 13px; }
        .key-row input::placeholder { color: #6b7280; }
        #file-upload { width: 100%; padding: 10px; border-radius: 10px; background: #1f1f1f; border: 1px solid #374151; color: #9ca3af; font-size: 13px; }
        select { width: 100%; padding: 10px 12px; border-radius: 10px; background: #1f1f1f; border: 1px solid #374151; color: #fff; font-size: 14px; }
        #viewer { height: 280px; background: #fff; color: #111; border-radius: 12px; overflow-y: auto; padding: 14px; font-size: 15px; line-height: 1.7; }
        #status { font-size: 13px; color: #9ca3af; text-align: center; min-height: 18px; }
        #progress-wrap { background: #1f1f1f; border-radius: 6px; height: 6px; overflow: hidden; display: none; }
        #progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s; border-radius: 6px; }
        button { padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 15px; color: white; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
        button:active { opacity: 0.75; transform: scale(0.97); }
        #speak { background: linear-gradient(135deg, #1d4ed8, #2563eb); width: 100%; }
        #speak.speaking { background: linear-gradient(135deg, #15803d, #16a34a); }
        #speak.loading { background: linear-gradient(135deg, #92400e, #b45309); }
        .nav-btns { display: flex; gap: 10px; }
        .nav-btns button { flex: 1; background: #374151; }
        #stop { width: 100%; background: #991b1b; }
        #chunk-info { font-size: 12px; color: #6b7280; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>📖 Trình Đọc Sách</h2>
    <div class="key-row">
        <input type="password" id="api-key" placeholder="Dán Gemini API Key vào đây..." />
    </div>
    <input type="file" id="file-upload" accept=".epub">
    <select id="toc-select"><option value="">-- Chọn chương --</option></select>
    <div style="display:flex;gap:8px">
        <select id="voice-select" style="flex:1;padding:10px 12px;border-radius:10px;background:#1f1f1f;border:1px solid #374151;color:#fff;font-size:13px">
            <option value="Aoede">🌸 Aoede — Nhẹ nhàng</option>
            <option value="Leda">✨ Leda — Trẻ trung</option>
            <option value="Kore">💎 Kore — Dứt khoát</option>
            <option value="Puck">⚡ Puck — Sôi nổi</option>
            <option value="Charon">📖 Charon — Rõ ràng</option>
            <option value="Fenrir">🔥 Fenrir — Mạnh mẽ</option>
            <option value="Zephyr">☀️ Zephyr — Tươi sáng</option>
            <option value="Umbriel">🌙 Umbriel — Thư thái</option>
        </select>
        <select id="speed-select" style="width:110px;padding:10px 8px;border-radius:10px;background:#1f1f1f;border:1px solid #374151;color:#fff;font-size:13px">
            <option value="0.75">🐢 0.75x</option>
            <option value="1.0" selected>▶️ 1.0x</option>
            <option value="1.25">🐇 1.25x</option>
            <option value="1.5">⚡ 1.5x</option>
            <option value="1.75">🚀 1.75x</option>
            <option value="2.0">💨 2.0x</option>
        </select>
    </div>
    <div id="viewer">Mở file EPUB để bắt đầu...</div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="status"></div>
    <div id="chunk-info"></div>
    <button id="speak">🔊 ĐỌC CHƯƠNG NÀY</button>
    <div class="nav-btns">
        <button id="prev">◀ TRƯỚC</button>
        <button id="next">SAU ▶</button>
    </div>
    <button id="stop">⏹ DỪNG</button>
</div>
<audio id="player" style="display:none"></audio>

<script>
    let book, rendition;
    let isPlaying = false;
    let stopRequested = false;
    const player = document.getElementById('player');
    const statusEl  = document.getElementById('status');
    const chunkEl   = document.getElementById('chunk-info');
    const speakBtn  = document.getElementById('speak');
    const progressW = document.getElementById('progress-wrap');
    const progressB = document.getElementById('progress-bar');

    // ── EPUB ──────────────────────────────────────────────
    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setStatus('Đang tải sách...');
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                book = ePub(ev.target.result);
                rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "scrolled-doc" });
                await rendition.display();
                setStatus('✅ Đã tải xong');
                const nav = await book.loaded.navigation;
                const sel = document.getElementById('toc-select');
                sel.innerHTML = '<option value="">-- Chọn chương --</option>';
                nav.toc.forEach(ch => {
                    const o = document.createElement('option');
                    o.value = ch.href; o.textContent = ch.label.trim();
                    sel.appendChild(o);
                });
            } catch(err) { setStatus('❌ ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
    });

    document.getElementById('toc-select').onchange = (e) => {
        if (e.target.value && rendition) { stopAll(); rendition.display(e.target.value); }
    };
    document.getElementById('prev').addEventListener('click', () => { stopAll(); rendition?.prev(); });
    document.getElementById('next').addEventListener('click', () => { stopAll(); rendition?.next(); });
    document.getElementById('stop').addEventListener('click', stopAll);

    // ── Lấy text ──────────────────────────────────────────
    async function getChapterText() {
        const loc = rendition.currentLocation();
        if (!loc?.start) return null;
        const section = book.spine.get(loc.start.href);
        if (!section) return null;
        const contents = await section.load(book.load.bind(book));
        const clone = contents.cloneNode(true);
        clone.querySelectorAll('script,style').forEach(el => el.remove());
        return clone.textContent.replace(/\s+/g, ' ').trim();
    }

    // ── Chia theo câu (~200 ký tự) ────────────────────────
    function splitSentences(text) {
        // Tách theo dấu câu, gom thành chunks ~400 ký tự
        const raw = text.match(/[^.!?…。！？]+[.!?…。！？]*/g) || [text];
        const chunks = [];
        let current = '';
        for (const s of raw) {
            if ((current + s).length > 400 && current.length > 0) {
                chunks.push(current.trim());
                current = s;
            } else { current += s; }
        }
        if (current.trim()) chunks.push(current.trim());
        return chunks.filter(c => c.length > 2);
    }

    // ── Gemini TTS → base64 → blob URL ───────────────────
    // Gemini trả về PCM raw 24kHz mono 16-bit — cần thêm WAV header
    function pcmToWav(pcmBytes, sampleRate = 24000, numChannels = 1, bitsPerSample = 16) {
        const dataLen = pcmBytes.length;
        const buffer = new ArrayBuffer(44 + dataLen);
        const v = new DataView(buffer);
        function str(o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
        str(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true);
        str(8, 'WAVE'); str(12, 'fmt '); v.setUint32(16, 16, true);
        v.setUint16(20, 1, true); v.setUint16(22, numChannels, true);
        v.setUint32(24, sampleRate, true);
        v.setUint32(28, sampleRate * numChannels * bitsPerSample / 8, true);
        v.setUint16(32, numChannels * bitsPerSample / 8, true);
        v.setUint16(34, bitsPerSample, true);
        str(36, 'data'); v.setUint32(40, dataLen, true);
        new Uint8Array(buffer, 44).set(pcmBytes);
        return buffer;
    }

    async function synthesize(text, apiKey, voiceName = "Aoede") {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                    }
                })
            }
        );
        if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
        const data = await res.json();
        const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
        if (!part?.data) throw new Error('Không có audio từ API');

        // Decode base64 → PCM bytes
        const binary = atob(part.data);
        const pcm = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) pcm[i] = binary.charCodeAt(i);

        // Thêm WAV header (Gemini trả về PCM 24kHz mono 16-bit)
        const wav = pcmToWav(pcm, 24000, 1, 16);
        return URL.createObjectURL(new Blob([wav], { type: 'audio/wav' }));
    }

    // ── Phát 1 blob URL qua <audio> element có sẵn ───────
    function playOne(blobUrl, speed = 1.0) {
        return new Promise((resolve, reject) => {
            player.src = blobUrl;
            player.playbackRate = speed;
            player.load();
            player.onended = () => { URL.revokeObjectURL(blobUrl); resolve(); };
            player.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(); };
            player.play().then(() => {}).catch(reject);
        });
    }

    // ── Pipeline: phát câu i, tổng hợp câu i+1 song song ─
    async function runPipeline(chunks, apiKey) {
        const total = chunks.length;
        setStatus(`Đang chuẩn bị câu đầu...`);

        const voiceName = document.getElementById('voice-select').value;
        const speed = parseFloat(document.getElementById('speed-select').value);
        let nextUrl = await synthesize(chunks[0], apiKey, voiceName);

        for (let i = 0; i < total; i++) {
            if (stopRequested) break;

            const urlToPlay = nextUrl;
            chunkEl.textContent = `Câu ${i+1}/${total}`;
            progressB.style.width = `${((i+1)/total)*100}%`;

            // Tổng hợp câu tiếp theo song song
            let nextPromise = (i + 1 < total)
                ? synthesize(chunks[i+1], apiKey).catch(() => null)
                : null;

            if (i === 0) {
                speakBtn.textContent = '⏸ ĐANG ĐỌC — BẤM ĐỂ DỪNG';
                speakBtn.classList.remove('loading');
                speakBtn.classList.add('speaking');
                setStatus('🎙 Đang phát...');
            }

            // Phát câu hiện tại
            await playOne(urlToPlay, speed);

            // Lấy câu tiếp (thường đã sẵn sàng)
            if (nextPromise) nextUrl = await nextPromise;
        }
    }

    // ── Nút ĐỌC ──────────────────────────────────────────
    document.getElementById('speak').addEventListener('click', async () => {
        if (isPlaying) { stopAll(); return; }
        const apiKey = document.getElementById('api-key').value.trim();
        if (!apiKey) { setStatus('⚠️ Chưa nhập API Key'); return; }
        if (!book)   { setStatus('⚠️ Chưa mở file EPUB'); return; }

        // iOS: phải gọi play() trực tiếp trong event handler
        // Gán src rỗng và play() ngay để unlock
        player.src = '';
        try { await player.play(); } catch(e) {}

        setStatus('Đang lấy nội dung...');
        const text = await getChapterText();
        if (!text || text.length < 5) { setStatus('⚠️ Không lấy được nội dung'); return; }

        const chunks = splitSentences(text);
        isPlaying = true; stopRequested = false;
        speakBtn.textContent = '⏳ Đang chuẩn bị...';
        speakBtn.classList.add('loading');
        progressW.style.display = 'block';
        progressB.style.width = '0%';

        try {
            await runPipeline(chunks, apiKey);
        } catch(e) {
            setStatus('❌ Lỗi: ' + e.message);
            resetUI(); return;
        }

        if (!stopRequested) setStatus('✅ Đọc xong!');
        resetUI();
    });

    // ── Helpers ───────────────────────────────────────────
    function stopAll() {
        stopRequested = true;
        player.pause();
        player.src = '';
        resetUI();
    }
    function resetUI() {
        isPlaying = false;
        speakBtn.textContent = '🔊 ĐỌC CHƯƠNG NÀY';
        speakBtn.classList.remove('speaking', 'loading');
        chunkEl.textContent = '';
        progressW.style.display = 'none';
        progressB.style.width = '0%';
    }
    function setStatus(msg) { statusEl.textContent = msg; }
</script>
