```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình đọc sách EPUB - Giọng Google</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; padding: 15px; }
        .box { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; }
        #viewer { height: 180px; background: #fff; color: #000; padding: 15px; border-radius: 12px; overflow-y: auto; margin: 15px 0; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; background: #2563eb; color: white; margin-bottom: 10px; }
        .btn-nav { background: #4b5563; }
        .btn-stop { background: #dc2626; }
        .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <input type="file" id="file-upload" accept=".epub">
        <select id="toc-select" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;"></select>
        
        <div class="control-row">
            <span>Tốc độ:</span>
            <input type="range" id="speed-slider" min="1" max="2" step="0.1" value="1" style="flex:1">
            <span id="speed-text">1.0x</span>
        </div>

        <div id="viewer">Mở file EPUB...</div>
        
        <button id="speak">🔊 ĐỌC CHƯƠNG NÀY (Giọng Google)</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn-nav" id="prev">TRƯỚC</button>
            <button class="btn-nav" id="next">SAU</button>
        </div>
        <button class="btn-stop" id="stop">DỪNG LẠI</button>
    </div>

    <script>
        let book, rendition, audio = new Audio();
        
        const speedSlider = document.getElementById('speed-slider');
        speedSlider.oninput = () => {
            document.getElementById('speed-text').textContent = speedSlider.value + 'x';
            audio.playbackRate = parseFloat(speedSlider.value);
        };

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                book = ePub(ev.target.result);
                rendition = book.renderTo("viewer", { width: "100%", height: "100%" });
                await rendition.display();
                const nav = await book.loaded.navigation;
                const select = document.getElementById('toc-select');
                nav.toc.forEach(ch => {
                    let opt = document.createElement('option');
                    opt.value = ch.href; opt.textContent = ch.label;
                    select.appendChild(opt);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('speak').addEventListener('click', async () => {
            audio.pause();
            const section = rendition.currentLocation().start.href;
            const content = await book.spine.get(section).load();
            const text = encodeURIComponent(content.textContent.replace(/\s+/g, ' ').trim().substring(0, 200));
            
            // Link Google TTS trực tiếp
            audio.src = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${text}`;
            audio.playbackRate = parseFloat(speedSlider.value);
            audio.play().catch(e => alert("Hãy nhấn vào màn hình một lần để Safari cho phép phát âm thanh!"));
        });

        document.getElementById('stop').addEventListener('click', () => audio.pause());
        document.getElementById('prev').addEventListener('click', () => rendition.prev());
        document.getElementById('next').addEventListener('click', () => rendition.next());
        document.getElementById('toc-select').onchange = (e) => rendition.display(e.target.value);
    </script>
</body>
</html>
